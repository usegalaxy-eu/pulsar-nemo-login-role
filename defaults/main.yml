---
# Where Pulsar is installed on the login node
pulsar_nemo_home: "{{ ansible_env.HOME }}/pulsar"
pulsar_nemo_venv: "{{ pulsar_nemo_home }}/.venv"

# Pulsar version (pin a commit/tag known to work with the login node's Python)
pulsar_nemo_version: "main"

# Relay connection (override; secrets via vault)
pulsar_nemo_relay_url: "http://CHANGE_ME:9000/"
pulsar_nemo_relay_username: "admin"
pulsar_nemo_relay_password: "CHANGE_ME"

# Slurm submission
pulsar_nemo_log_level: "INFO"
