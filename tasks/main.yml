---
- name: Create Pulsar directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pulsar_nemo_home }}"
    - "{{ pulsar_nemo_home }}/config"

- name: Create the Pulsar venv with the NEMO Python module
  shell: |
    module load {{ pulsar_nemo_python_module }}
    python3 -m venv {{ pulsar_nemo_venv }}
  args:
    executable: /bin/bash
    creates: "{{ pulsar_nemo_venv }}/bin/activate"

- name: Install Pulsar (pulsar-app, standalone) from pinned SHA
  shell: |
    module load {{ pulsar_nemo_python_module }}
    source {{ pulsar_nemo_venv }}/bin/activate
    pip install --upgrade pip
    pip install "git+https://github.com/galaxyproject/pulsar.git@{{ pulsar_nemo_version }}"
  args:
    executable: /bin/bash
    creates: "{{ pulsar_nemo_venv }}/bin/pulsar-main"

- name: Install pulsar-relay-client into the venv
  shell: |
    module load {{ pulsar_nemo_python_module }}
    source {{ pulsar_nemo_venv }}/bin/activate
    pip install "pulsar-relay-client{{ pulsar_nemo_relay_client_version }}"
  args:
    executable: /bin/bash
    creates: "{{ pulsar_nemo_venv }}/lib/python3.11/site-packages/pulsar_relay_client/__init__.py"

- name: Deploy Pulsar app config
  template:
    src: app.yml.j2
    dest: "{{ pulsar_nemo_home }}/config/app.yml"
    mode: "0600"

- name: Deploy job metrics config
  copy:
    src: job_metrics_conf.xml
    dest: "{{ pulsar_nemo_home }}/config/job_metrics_conf.xml"
    mode: "0644"

- name: Install supervisor into the venv
  shell: |
    module load {{ pulsar_nemo_python_module }}
    source {{ pulsar_nemo_venv }}/bin/activate
    pip install supervisor
  args:
    executable: /bin/bash
    creates: "{{ pulsar_nemo_venv }}/bin/supervisord"
  when: pulsar_nemo_use_supervisord

- name: Deploy supervisord launcher script
  template:
    src: run_pulsar.sh.j2
    dest: "{{ pulsar_nemo_home }}/run_pulsar.sh"
    mode: "0755"
  when: pulsar_nemo_use_supervisord

- name: Deploy supervisord config
  template:
    src: supervisord.conf.j2
    dest: "{{ pulsar_nemo_home }}/supervisord.conf"
    mode: "0644"
  when: pulsar_nemo_use_supervisord

- name: Ensure supervisord starts on boot via @reboot cron
  cron:
    name: "start pulsar supervisord"
    special_time: reboot
    job: "cd {{ pulsar_nemo_home }} && {{ pulsar_nemo_venv }}/bin/supervisord -c {{ pulsar_nemo_home }}/supervisord.conf"
  when: pulsar_nemo_use_supervisord

- name: Check if supervisord is already running
  shell: "{{ pulsar_nemo_venv }}/bin/supervisorctl -c {{ pulsar_nemo_home }}/supervisord.conf status"
  args:
    executable: /bin/bash
  register: _supervisor_status
  failed_when: false
  changed_when: false
  when: pulsar_nemo_use_supervisord

- name: Start supervisord if not already running
  shell: |
    module load {{ pulsar_nemo_python_module }}
    cd {{ pulsar_nemo_home }}
    {{ pulsar_nemo_venv }}/bin/supervisord -c {{ pulsar_nemo_home }}/supervisord.conf
  args:
    executable: /bin/bash
  when:
    - pulsar_nemo_use_supervisord
    - _supervisor_status.rc != 0

- name: Deploy legacy start wrapper (fallback, not used when supervisord is active)
  template:
    src: start_pulsar.sh.j2
    dest: "{{ pulsar_nemo_home }}/start_pulsar.sh"
    mode: "0755"
